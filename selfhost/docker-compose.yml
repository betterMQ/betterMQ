# Self-host: single node, local WAL + RocksDB.
#
#   cd selfhost && docker compose up -d --build
#   open http://localhost:8080/panel/
#
# Configure storage and cluster from Panel → Infrastructure (no config file mount).

services:
  bettermq:
    build:
      context: ..
      dockerfile: selfhost/Dockerfile
    image: bettermq:selfhost
    ports:
      - "8080:8080"
    volumes:
      - bettermq-data:/data
    command: ["serve", "--data-dir", "/data"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  bettermq-data:
