# Self-host: single node + MinIO + SlateDB (panel configures S3 — no JSON mount).
#
#   cd selfhost && docker compose -f docker-compose.slate.yml up -d --build
#   open http://localhost:8080/panel/ → Infrastructure → SlateDB
#   MinIO: endpoint http://minio:9000  buckets bettermq + bettermq-payloads  (minio / minio12345)
#   MinIO console: http://localhost:9001

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:9000 minio minio12345 2>/dev/null; do sleep 1; done;
        mc mb --ignore-existing local/bettermq;
        mc mb --ignore-existing local/bettermq-payloads;
        echo buckets ready;
      "

  bettermq:
    build:
      context: ..
      dockerfile: selfhost/Dockerfile
    image: bettermq:selfhost
    ports:
      - "8080:8080"
    volumes:
      - bettermq-data:/data
    command: ["serve", "--data-dir", "/data"]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

volumes:
  minio-data:
  bettermq-data:
