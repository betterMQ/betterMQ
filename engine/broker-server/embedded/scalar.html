<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BetterMQ API Reference</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a0a0a; }
    #api-reference { height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <div id="api-reference"></div>
  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.58.0"></script>
  <script>
    // Single-document config (top-level `url`) — Scalar fetches the spec and
    // manages its own loading state. Avoids the `sources`/`slug` multi-document
    // path that triggered "Document not found in configList" + a stuck skeleton.
    Scalar.createApiReference("#api-reference", {
      url: new URL("/openapi.json", window.location.href).href,
      theme: "default",
      layout: "modern",
      darkMode: true,
      hideDownloadButton: false,
      metaData: { title: "BetterMQ API" },
    });
  </script>
</body>
</html>
